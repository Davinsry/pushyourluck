name: Supabase keep-alive

# Free Supabase projects pause after ~1 week of inactivity. This hits the
# project once a day so it stays awake. Add repo secrets SUPABASE_URL and
# SUPABASE_KEY (the publishable/anon key) under Settings → Secrets → Actions.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/")
          echo "Supabase responded: $code"
          # Any HTTP response (e.g. 200/401/404) means the project is awake.
          # Only 000 (no connection) is a real failure.
          [ "$code" != "000" ]
